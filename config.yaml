pinecone:
  index_name: plato-ground-segment
  dimension: 1536           # text-embedding-3-small
  metric: cosine
  namespace: esa-missions

embeddings:
  # OpenAI embedding setup:
  #provider: openai
  #model: text-embedding-3-small
  # Alternative local embedding setup:
  provider: sentence-transformers
  model: all-MiniLM-L6-v2

chunking:
  chunk_size: 1000
  chunk_overlap: 200

llm:
  default_provider: meta
  providers:
    openai:
      model: gpt-4o
      max_tokens: 2048
      temperature: 0.1
    anthropic:
      model: claude-sonnet-4-6
      max_tokens: 2048
      temperature: 0.1
    google:
      model: gemini-1.5-pro
      max_tokens: 2048
      temperature: 0.1
    meta:
      model: llama3.1
      max_tokens: 2048
      temperature: 0.1

retrieval:
  top_k: 5
  score_threshold: 0.65

api:
  host: "0.0.0.0"
  port: 8000
  title: "ESA PLATO Ground Segment RAG"
  version: "1.0.0"
