pinecone:
  index_name: ground-segment-documents
  dimension: 384           # all-MiniLM-L6-v2
  metric: cosine
  namespace: esa-missions

embeddings:
  # OpenAI embedding setup:
  #provider: openai
  #model: text-embedding-3-small
  # Alternative local embedding setup:
  provider: sentence-transformers
  model: all-MiniLM-L6-v2

chunking:
  chunk_size: 1000
  chunk_overlap: 200

llm:
  default_provider: openai
  providers:
    openai:
      model: deepseek-ai/DeepSeek-V4-Pro
      max_tokens: 2048
      temperature: 0.1
    anthropic:
      model: claude-sonnet-4-6
      max_tokens: 2048
      temperature: 0.1
    google:
      model: gemini-1.5-pro
      max_tokens: 2048
      temperature: 0.1
    ollama:
      model: llama3.2:1b
      max_tokens: 512
      temperature: 0.1
   
retrieval:
  top_k: 5
  score_threshold: 0.65

api:
  host: "0.0.0.0"
  port: 8000
  title: "ESA PLATO Ground Segment RAG"
  version: "1.0.0"
